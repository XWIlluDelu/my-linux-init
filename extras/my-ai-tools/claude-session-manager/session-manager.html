<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Claude Code Session Manager</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --col-title:   minmax(220px, 1.4fr);
      --col-path:    minmax(180px, 1.0fr);
      --col-prompts: minmax(300px, 2fr);
      --col-meta:    140px;
      --col-action:  92px;
      --table-columns: var(--col-title) var(--col-path) var(--col-prompts) var(--col-meta) var(--col-action);

      /* Dark palette */
      --bg-base:          #09090b;
      --bg-panel:         #121217;
      --bg-row-hover:     #1a1a20;
      --bg-row-selected:  #1e1c14;
      --bg-panel-inset:   #0d0d10;
      --bg-chip:          #1f1f24;
      --bg-input:         #15151a;
      --bg-danger-dim:    rgba(239,68,68,.12);
      --bg-accent-dim:    rgba(217,119,6,.12);

      --text-primary:   #fafafa;
      --text-secondary: #a1a1aa;
      --text-muted:     #52525b;
      --text-mono:      #d4a257;

      --accent:         #f59e0b;
      --accent-soft:    #b45309;
      --accent-glow:    rgba(245,158,11,.15);

      --border-base:    #27272a;
      --border-subtle:  #1e1e22;
      --border-accent:  rgba(245,158,11,.4);

      --danger:         #ef4444;
      --danger-soft:    rgba(239,68,68,.15);

      --radius-sm: 4px;
      --radius-md: 8px;
      --radius-lg: 12px;

      --font-ui:   'DM Sans', system-ui, sans-serif;
      --font-mono: 'IBM Plex Mono', monospace;

      --text-xs:   0.75rem;
      --text-sm:   0.875rem;
      --text-base: 1rem;
      --text-md:   1.125rem;

      --ease-out: cubic-bezier(.2,.8,.2,1);
      --dur-fast: 150ms;
      --dur-base: 250ms;
    }

    /* ─── Light mode overrides ─────────────────── */
    html[data-theme="light"] {
      color-scheme: light;
      --bg-base:          #fafaf9;
      --bg-panel:         #ffffff;
      --bg-row-hover:     #f5f5f4;
      --bg-row-selected:  #fffbeb;
      --bg-panel-inset:   #f5f5f4;
      --bg-chip:          #e7e7e4;
      --bg-input:         #ffffff;
      --bg-danger-dim:    rgba(239,68,68,.08);
      --bg-accent-dim:    rgba(217,119,6,.08);

      --text-primary:   #18181b;
      --text-secondary: #52525b;
      --text-muted:     #a1a1aa;
      --text-mono:      #92400e;

      --accent:         #d97706;
      --accent-soft:    #b45309;
      --accent-glow:    rgba(217,119,6,.1);

      --border-base:    #e4e4e7;
      --border-subtle:  #f4f4f5;
      --border-accent:  rgba(217,119,6,.3);

      --danger:         #dc2626;
      --danger-soft:    rgba(220,38,38,.08);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { color-scheme: dark; }
    html[data-theme="light"] { color-scheme: light; }

    body {
      min-height: 100vh;
      background: var(--bg-base);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
    }

    .visually-hidden {
      position: absolute !important;
      width: 1px;
      height: 1px;
      padding: 0;
      margin: -1px;
      overflow: hidden;
      clip: rect(0, 0, 0, 0);
      white-space: nowrap;
      border: 0;
    }

    /* ─── Layout shell ──────────────────────────── */
    .shell {
      display: grid;
      grid-template-rows: auto 1fr;
      height: 100dvh;
      overflow: hidden;
    }

    .backdrop {
      position: fixed;
      inset: 0;
      background: rgba(3, 7, 18, 0.42);
      opacity: 0;
      pointer-events: none;
      transition: opacity var(--dur-base) var(--ease-out);
      z-index: 90;
      backdrop-filter: blur(1.5px);
    }
    .backdrop[data-open="true"] {
      opacity: 1;
      pointer-events: auto;
    }

    /* ─── Topbar ────────────────────────────────── */
    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1.5rem;
      padding: 0 1.5rem;
      height: 56px;
      border-bottom: 1px solid var(--border-base);
      background: var(--bg-panel);
      flex-shrink: 0;
    }

    .topbar-left {
      display: flex;
      align-items: center;
      gap: 1rem;
      min-width: 0;
    }

    .app-icon {
      width: 24px;
      height: 24px;
      border-radius: var(--radius-sm);
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .app-icon svg { width: 14px; height: 14px; fill: var(--bg-panel); }

    .app-title {
      font-size: var(--text-base);
      font-weight: 600;
      color: var(--text-primary);
      letter-spacing: -.02em;
    }

    .stat-pills {
      display: flex;
      gap: 0.5rem;
    }

    .stat-pill {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      padding: 0.25rem 0.6rem;
      border-radius: 20px;
      background: var(--bg-panel-inset);
      border: 1px solid var(--border-base);
      font-size: var(--text-xs);
      color: var(--text-secondary);
    }
    .stat-pill strong {
      color: var(--text-primary);
      font-weight: 600;
    }

    .topbar-right {
      display: flex;
      align-items: center;
      gap: 1rem;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--text-muted);
    }
    .status-dot[data-ready="true"] { background: #10b981; box-shadow: 0 0 8px rgba(16,185,129,.4); }
    .status-dot[data-error="true"] { background: var(--danger); }

    .timestamp {
      font-size: var(--text-xs);
      color: var(--text-secondary);
      font-family: var(--font-mono);
    }

    /* ─── Buttons ───────────────────────────────── */
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.8rem;
      border-radius: var(--radius-sm);
      border: 1px solid var(--border-base);
      background: var(--bg-chip);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-xs);
      font-weight: 500;
      cursor: pointer;
      transition: all var(--dur-fast);
    }
    .btn:hover { border-color: var(--text-secondary); background: var(--bg-row-hover); }
    .btn:active { transform: translateY(1px); }
    .btn[disabled] { opacity: .5; cursor: not-allowed; }

    .btn-icon { padding: 0.4rem; }
    .btn-icon svg { width: 16px; height: 16px; stroke: currentColor; }

    /* ─── Lang toggle ───────────────────────────── */
    .lang-toggle {
      display: inline-flex;
      padding: 2px;
      border-radius: var(--radius-sm);
      background: var(--bg-panel-inset);
      border: 1px solid var(--border-base);
    }
    .lang-toggle button {
      padding: 0.25rem 0.6rem;
      font-size: 11px;
      font-weight: 600;
      border-radius: 2px;
      background: transparent;
      color: var(--text-secondary);
      border: none;
      cursor: pointer;
      text-transform: uppercase;
    }
    .lang-toggle button[data-active="true"] {
      background: var(--accent);
      color: var(--bg-panel);
    }

    /* ─── Content area ──────────────────────────── */
    .content {
      display: grid;
      grid-template-rows: auto 1fr;
      min-height: 0;
      overflow: hidden;
    }

    /* ─── Toolbar ───────────────────────────────── */
    .toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      border-bottom: 1px solid var(--border-base);
      background: var(--bg-panel);
    }

    .toolbar-left { display: flex; align-items: center; gap: 1rem; flex: 1; }

    .search-wrap {
      position: relative;
      flex: 1;
      max-width: 480px;
    }
    .search-wrap svg {
      position: absolute;
      left: 0.75rem;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      stroke: var(--text-muted);
    }
    .search-wrap input {
      width: 100%;
      padding: 0.5rem 1rem 0.5rem 2.25rem;
      border: 1px solid var(--border-base);
      border-radius: var(--radius-md);
      background: var(--bg-input);
      color: var(--text-primary);
      font-family: var(--font-ui);
      font-size: var(--text-sm);
      outline: none;
      transition: all var(--dur-fast);
    }
    .search-wrap input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 2px var(--accent-glow);
    }

    .sort-bar {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .sort-label {
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      font-weight: 600;
      letter-spacing: .05em;
    }
    .sort-chip {
      padding: 0.25rem 0.6rem;
      border-radius: 4px;
      background: transparent;
      color: var(--text-secondary);
      font-size: 11px;
      font-weight: 600;
      cursor: pointer;
      border: 1px solid transparent;
      transition: all var(--dur-fast);
      text-transform: uppercase;
    }
    .sort-chip:hover { color: var(--text-primary); background: var(--bg-chip); }
    .sort-chip[data-active="true"] {
      color: var(--accent);
      background: var(--bg-accent-dim);
      border-color: var(--border-accent);
    }

    /* ─── Table area ────────────────────────────── */
    .panel-frame {
      position: relative;
      overflow: hidden;
      min-height: 0;
    }

    .panel-scroll {
      height: 100%;
      overflow: auto;
    }
    .panel-scroll::-webkit-scrollbar { width: 8px; height: 8px; }
    .panel-scroll::-webkit-scrollbar-thumb { background: var(--border-base); border-radius: 4px; }
    .panel-scroll::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }

    .sessions-table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
    }

    .sessions-table thead {
      position: sticky;
      top: 0;
      z-index: 10;
      background: var(--bg-panel);
    }

    .table-head-grid,
    .session-row {
      display: grid;
      grid-template-columns: var(--table-columns);
      align-items: center;
      padding: 0 1.5rem;
    }

    .table-head-grid {
      height: 40px;
      border-bottom: 1px solid var(--border-base);
    }

    .head-cell { font-size: 11px; text-transform: uppercase; font-weight: 600; color: var(--text-muted); letter-spacing: .05em; }
    .head-cell button {
      all: unset;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
    }
    .head-cell button:hover { color: var(--text-secondary); }

    /* ─── Session rows ──────────────────────────── */
    .session-row {
      min-height: 72px;
      border-bottom: 1px solid var(--border-subtle);
      background: transparent;
      cursor: pointer;
      transition: all var(--dur-fast);
      position: relative;
      text-align: left;
    }
    .session-row::before {
      content: '';
      position: absolute;
      left: 0;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--accent);
      opacity: 0;
      transition: opacity var(--dur-fast);
    }
    .session-row:hover { background: var(--bg-row-hover); }
    .session-row[data-selected="true"] {
      background: var(--bg-row-selected);
    }
    .session-row[data-selected="true"]::before { opacity: 1; }

    .cell { min-width: 0; padding-right: 1rem; }
    .cell:last-child { padding-right: 0; }

    .title-stack { display: flex; flex-direction: column; gap: 0.25rem; }
    .session-title-text {
      font-size: var(--text-sm);
      font-weight: 600;
      color: var(--text-primary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .title-meta {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      font-size: 11px;
      color: var(--text-secondary);
    }
    .title-badge {
      font-size: 9px;
      text-transform: uppercase;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 2px;
      background: var(--bg-chip);
      color: var(--text-muted);
      border: 1px solid var(--border-base);
    }
    .title-badge.explicit {
      color: #10b981;
      background: rgba(16,185,129,.1);
      border-color: rgba(16,185,129,.2);
    }

    .path-text {
      font-family: var(--font-mono);
      font-size: 12px;
      color: var(--text-mono);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      opacity: 0.8;
    }

    .prompts-cell {
      display: flex;
      flex-direction: column;
      gap: 0.15rem;
    }
    .prompt-preview {
      font-size: 12px;
      color: var(--text-secondary);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      display: block;
    }
    .prompt-preview.last { color: var(--text-muted); font-size: 11px; }

    .meta-cell {
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      text-align: right;
      gap: 0.15rem;
    }
    .meta-length { font-weight: 600; color: var(--text-primary); font-size: 12px; }
    .meta-size { font-family: var(--font-mono); font-size: 11px; color: var(--text-muted); }

    .action-cell { display: flex; justify-content: flex-end; }

    .inline-delete {
      width: 32px;
      height: 32px;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      border: 1px solid transparent;
      background: transparent;
      color: var(--text-muted);
      cursor: pointer;
      transition: all var(--dur-fast);
    }
    .session-row:hover .inline-delete { color: var(--text-secondary); }
    .inline-delete:hover {
      color: var(--danger) !important;
      background: var(--danger-soft);
      border-color: var(--danger);
    }
    .inline-delete[data-armed="true"] {
      width: auto;
      padding: 0 0.75rem;
      background: var(--danger);
      color: white !important;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
    }

    /* ─── Drawer ────────────────────────────────── */
    .drawer {
      position: fixed;
      top: 0;
      right: 0;
      bottom: 0;
      width: 500px;
      max-width: 80vw;
      background: var(--bg-panel);
      border-left: 1px solid var(--border-base);
      transform: translateX(100%);
      transition: transform var(--dur-base) var(--ease-out);
      z-index: 100;
      display: flex;
      flex-direction: column;
      box-shadow: -10px 0 30px rgba(0,0,0,.2);
    }
    .drawer[data-open="true"] { transform: translateX(0); }

    .drawer-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-base);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
    }
    .drawer-title-group { min-width: 0; }
    .drawer-eyebrow { font-size: 11px; font-weight: 700; color: var(--accent); text-transform: uppercase; margin-bottom: 0.5rem; }
    .drawer-title { font-size: var(--text-md); font-weight: 700; color: var(--text-primary); line-height: 1.2; }

    .drawer-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr;
      padding: 1rem 1.5rem;
      gap: 1rem;
      background: var(--bg-panel-inset);
      border-bottom: 1px solid var(--border-base);
    }
    .metric-cell { display: flex; flex-direction: column; gap: 0.25rem; }
    .metric-label { font-size: 10px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
    .metric-value { font-size: 13px; font-weight: 600; color: var(--text-primary); }

    .drawer-body { flex: 1; overflow-y: auto; padding-bottom: 2rem; }
    .md-section { padding: 1.5rem; border-bottom: 1px solid var(--border-subtle); }
    .md-section h3 { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 1rem; }
    .md-block { font-size: 14px; line-height: 1.6; color: var(--text-secondary); }
    .md-block p { margin-bottom: 1rem; }
    .md-block code { font-family: var(--font-mono); background: var(--bg-chip); padding: 0.2rem 0.4rem; border-radius: 3px; font-size: 0.9em; color: var(--text-mono); }
    .md-block pre { background: var(--bg-panel-inset); padding: 1rem; border-radius: var(--radius-md); overflow-x: auto; margin-bottom: 1rem; border: 1px solid var(--border-base); }

    /* ─── State Layers ─────────────────────────── */
    .state-layer {
      position: absolute;
      inset: 0;
      background: var(--bg-base);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
    }
    .state-layer[data-visible="false"] {
      display: none;
    }
    .state-card { text-align: center; max-width: 320px; }
    .spinner { width: 32px; height: 32px; border: 3px solid var(--border-base); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Responsive ───────────────────────────── */
    @media (max-width: 1024px) {
      :root { --col-prompts: 0; }
      .prompts-cell { display: none; }
      .head-cell:nth-child(3) { display: none; }
    }
    @media (max-width: 768px) {
      .topbar { flex-direction: column; height: auto; padding: 1rem; align-items: stretch; gap: 1rem; }
      .stat-pills { display: none; }
      .drawer { width: 100%; max-width: 100%; }
      .table-head-grid { display: none; }
      .session-row { grid-template-columns: 1fr auto; padding: 1rem; min-height: auto; gap: 0.5rem; }
      .path-text, .prompts-cell { display: none; }
    }

  </style>
</head>
<body>
  <div class="backdrop" id="drawerBackdrop" data-open="false"></div>

  <main class="shell" id="appShell" aria-label="Claude Code session dashboard">

    <!-- ── Top bar ── -->
    <header class="topbar" aria-labelledby="appTitle">
      <div class="topbar-left">
        <div class="app-icon" aria-hidden="true">
          <svg viewBox="0 0 16 16"><path d="M8 1L14 4.5V11.5L8 15L2 11.5V4.5L8 1Z"/></svg>
        </div>
        <span class="app-title" id="appTitle"></span>
        <div class="topbar-sep" aria-hidden="true"></div>
        <div class="stat-pills" role="status" aria-live="polite">
          <div class="stat-pill"><span id="statVisibleLabel"></span>&nbsp;<strong id="statVisible">—</strong></div>
          <div class="stat-pill"><span id="statProjectsLabel"></span>&nbsp;<strong id="statProjects">—</strong></div>
          <div class="stat-pill"><span id="statLongestLabel"></span>&nbsp;<strong id="statLongest">—</strong></div>
        </div>
      </div>
      <div class="topbar-right">
        <div id="statusDot" class="status-dot" aria-hidden="true"></div>
        <span class="timestamp" id="lastUpdatedLabel">—</span>
        <div class="lang-toggle" id="langToggle" aria-label="Language toggle">
          <button type="button" id="langZh" data-lang="zh">中文</button>
          <button type="button" id="langEn" data-lang="en">EN</button>
        </div>
        <button class="btn btn-icon" id="themeToggleButton" type="button" aria-label="Toggle theme" title="Toggle light/dark">
          <svg id="themeIconMoon" viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          <svg id="themeIconSun"  viewBox="0 0 24 24" fill="none" stroke-width="1.8" aria-hidden="true" style="display:none"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        </button>
      </div>

      <!-- hidden subtitle/eyebrow kept for i18n render calls -->
      <p class="visually-hidden" id="eyebrowLabel"></p>
      <p class="visually-hidden" id="subtitleText"></p>
      <span class="visually-hidden" id="statusSummary"></span>
    </header>

    <!-- ── Content ── -->
    <div class="content">

      <!-- Toolbar -->
      <div class="toolbar">
        <div class="toolbar-left">
          <label class="search-wrap" for="searchInput">
            <span class="visually-hidden">Search sessions</span>
            <svg viewBox="0 0 24 24" fill="none" stroke-width="2" aria-hidden="true">
              <circle cx="11" cy="11" r="7.5"/><path d="m19.5 19.5-4-4"/>
            </svg>
            <input id="searchInput" type="search" autocomplete="off" spellcheck="false">
          </label>

          <nav class="sort-bar" id="sortBar" aria-label="Sort controls">
            <span class="sort-label" id="sortLabel"></span>
            <button class="sort-chip" type="button" data-sort-chip="updatedAt"></button>
            <button class="sort-chip" type="button" data-sort-chip="title"></button>
            <button class="sort-chip" type="button" data-sort-chip="projectPath"></button>
            <button class="sort-chip" type="button" data-sort-chip="overallLength"></button>
          </nav>

        </div>

        <div class="toolbar-right">
          <button class="btn" id="refreshButton" type="button"></button>
          <button class="btn" id="toggleInspectorButton" type="button"></button>
        </div>
      </div>

      <!-- Table panel -->
      <div class="panel-frame" aria-live="polite" id="workspaceSection">
        <div class="panel-scroll">
          <table class="sessions-table" aria-describedby="tableSummary">
            <caption class="visually-hidden" id="tableSummary"></caption>
            <thead>
              <tr>
                <th scope="col" colspan="5">

      function t(key) {
        return I18N[state.lang][key] || key;
      }

      function ariaLabelForSort(key) {
        const labelMap = {
          title: t('thTitle'),
          projectPath: t('thProject'),
          firstPrompt: t('thFirst'),
          overallLength: t('thLength')
        };
        return labelMap[key] || key;
      }

      function safeText(value, fallback = '') {
        if (typeof value === 'string' && value.trim()) return value.trim();
        if (typeof value === 'number' && Number.isFinite(value)) return String(value);
        return fallback;
      }

      function parseDate(value) {
        if (!value) return null;
        const date = new Date(value);
        return Number.isNaN(date.getTime()) ? null : date;
      }

      function formatDate(value) {
        const date = parseDate(value);
        if (!date) return t('unknown');
        return new Intl.DateTimeFormat(state.lang === 'zh' ? 'zh-CN' : 'en-US', {
          month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit'
        }).format(date);
      }

      function formatRelative(value) {
        const date = parseDate(value);
        if (!date) return t('unknown');
        const diffMs = date.getTime() - Date.now();
        const minutes = Math.round(diffMs / 60000);
        const locale = state.lang === 'zh' ? 'zh-CN' : 'en-US';
        const rtf = new Intl.RelativeTimeFormat(locale, { numeric: 'auto' });
        if (Math.abs(minutes) < 1) return state.lang === 'zh' ? '刚刚' : 'just now';
        if (Math.abs(minutes) < 60) return rtf.format(minutes, 'minute');
        const hours = Math.round(minutes / 60);
        if (Math.abs(hours) < 24) return rtf.format(hours, 'hour');
        const days = Math.round(hours / 24);
        return rtf.format(days, 'day');
      }

      function overallLength(session) {
        if (Number.isFinite(session.entryCount)) return session.entryCount;
        const total = (Number.isFinite(session.userMessageCount) ? session.userMessageCount : 0) +
          (Number.isFinite(session.assistantMessageCount) ? session.assistantMessageCount : 0);
        return total || 0;
      }

      function formatLength(value) {
        if (!Number.isFinite(value) || value <= 0) return '0 ' + (state.lang === 'zh' ? '条' : 'entries');
        const unit = state.lang === 'zh' ? '条' : (value === 1 ? 'entry' : 'entries');
        return value.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US') + ' ' + unit;
      }

      function formatBytes(bytes) {
        if (!Number.isFinite(bytes) || bytes < 0) return t('unavailable');
        const units = ['B', 'KB', 'MB', 'GB'];
        let value = bytes;
        let unitIndex = 0;
        while (value >= 1024 && unitIndex < units.length - 1) {
          value /= 1024;
          unitIndex += 1;
        }
        const display = value >= 10 || unitIndex === 0 ? Math.round(value) : value.toFixed(1);
        return display + ' ' + units[unitIndex];
      }

      function normalizedTitleSource(value) {
        const source = typeof value === 'string' ? value.trim().toLowerCase() : '';
        if (!source) return 'derived';
        if (source.includes('explicit') || source.includes('manual') || source.includes('user') || source.includes('ai-title')) return 'explicit';
        return 'derived';
      }

      function normalizeSession(raw, index) {
        const title = safeText(raw && raw.title, t('untitledSession'));
        const firstPrompt = safeText(raw && raw.firstPrompt, '');
        const lastPrompt = safeText(raw && raw.lastPrompt, '');
        const projectPath = safeText(raw && raw.projectPath, '');
        const sessionId = safeText(raw && raw.sessionId, t('sessionPrefix') + '-' + index);
        const recordId = safeText(raw && raw.recordId, 'record-' + index + '-' + sessionId);
        const sourceCategory = safeText(raw && raw.sourceCategory, 'claude').toLowerCase();
        const titleKind = normalizedTitleSource(raw && raw.titleSource);
        const computedLength = overallLength(raw || {});
        const startedAt = raw && raw.startedAt ? raw.startedAt : null;
        const updatedAt = raw && raw.updatedAt ? raw.updatedAt : startedAt;
        const storageBytes = Number.isFinite(raw && raw.storageBytes) ? raw.storageBytes : null;
        const subagentCount = Number.isFinite(raw && raw.subagentCount) ? raw.subagentCount : 0;
        const subagentEntryCount = Number.isFinite(raw && raw.subagentEntryCount) ? raw.subagentEntryCount : 0;
        const subagentStorageBytes = Number.isFinite(raw && raw.subagentStorageBytes) ? raw.subagentStorageBytes : 0;
        const subagentUpdatedAt = raw && raw.subagentUpdatedAt ? String(raw.subagentUpdatedAt) : null;

        return {
          raw: raw || {},
          recordId,
          sessionId,
          sourceCategory,
          title,
          titleSource: raw && raw.titleSource ? String(raw.titleSource) : '',
          titleKind,
          projectPath,
          firstPrompt,
          lastPrompt,
          entryCount: Number.isFinite(raw && raw.entryCount) ? raw.entryCount : null,
          userMessageCount: Number.isFinite(raw && raw.userMessageCount) ? raw.userMessageCount : null,
          assistantMessageCount: Number.isFinite(raw && raw.assistantMessageCount) ? raw.assistantMessageCount : null,
          startedAt,
          updatedAt,
          sourcePath: raw && raw.sourcePath ? String(raw.sourcePath) : '',
          storageBytes,
          subagentCount,
          subagentEntryCount,
          subagentStorageBytes,
          subagentUpdatedAt,
          overallLength: computedLength,
          searchable: [title, projectPath, firstPrompt, lastPrompt, sessionId].filter(Boolean).join(' ').toLowerCase(),
          sortDate: parseDate(updatedAt)?.getTime() || parseDate(startedAt)?.getTime() || 0
        };
      }

      function interpolate(template, values) {
        return String(template).replace(/\{(\w+)\}/g, (_, key) => key in values ? String(values[key]) : '');
      }

      function compareText(a, b) {
        return a.localeCompare(b, state.lang === 'zh' ? 'zh-CN' : 'en-US', { sensitivity: 'base', numeric: true });
      }

      function sortSessions(sessions) {
        const multiplier = state.sortDirection === 'asc' ? 1 : -1;
        const key = state.sortKey;
        return [...sessions].sort((left, right) => {
          if (key === 'overallLength') {
            return (left.overallLength - right.overallLength) * multiplier || compareText(left.title, right.title);
          }
          if (key === 'updatedAt') {
            return (left.sortDate - right.sortDate) * multiplier || compareText(left.title, right.title);
          }
          return compareText(safeText(left[key], ''), safeText(right[key], '')) * multiplier || (left.sortDate - right.sortDate) * -1;
        });
      }

      function applyFilters() {
        const query = state.searchQuery.trim().toLowerCase();
        const base = query ? state.sessions.filter((session) => session.searchable.includes(query)) : state.sessions.slice();
        state.filteredSessions = sortSessions(base);
        if (!state.filteredSessions.some((session) => session.recordId === state.selectedRecordId)) {
          state.selectedRecordId = state.filteredSessions[0] ? state.filteredSessions[0].recordId : null;
        }
      }

      function renderHeader() {
        document.documentElement.lang = I18N[state.lang].htmlLang;
        els.appShell.setAttribute('aria-label', t('shellAria'));

          const key = chip.getAttribute('data-sort-chip');
          chip.dataset.baseLabel = key === 'updatedAt' ? t('sortRecent') : key === 'title' ? t('sortTitle') : key === 'projectPath' ? t('sortProject') : t('sortLength');

        els.thTitle.dataset.baseLabel = t('thTitle');
        els.thProject.dataset.baseLabel = t('thProject');
        els.thPrompts.dataset.baseLabel = t('thPrompts');
        els.thLength.dataset.baseLabel = t('thLength');

        els.loadingTitle.textContent = t('loadingTitle');
        els.loadingCopy.textContent = t('loadingCopy');

        els.closeDrawerButton.textContent = t('closeDrawer');
        els.metricLengthLabel.textContent = t('metricLength');

        els.metricCreatedLabel.textContent = t('metricCreated');

        els.placeholderTitle.textContent = t('noSelection');
        els.placeholderCopy.textContent = t('noSelectionCopy');
        els.langZh.dataset.active = state.lang === 'zh' ? 'true' : 'false';
        els.langEn.dataset.active = state.lang === 'en' ? 'true' : 'false';
      }

      function renderStats() {
        const visible = state.filteredSessions.length;
        const projects = new Set(state.filteredSessions.map((session) => session.projectPath)).size;
        const longest = state.filteredSessions.reduce((max, session) => Math.max(max, session.overallLength), 0);
        els.statVisible.textContent = state.loading ? '—' : visible.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US');
        els.statProjects.textContent = state.loading ? '—' : projects.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US');
        els.statLongest.textContent = state.loading ? '—' : formatLength(longest);
        if (state.loading) {
          els.statusSummary.textContent = t('statusLoading');
          els.lastUpdatedLabel.textContent = '—';
          els.statusDot.dataset.ready = 'false';
          els.statusDot.dataset.error = 'false';
        } else if (state.error) {
          els.statusSummary.textContent = t('statusError');
          els.lastUpdatedLabel.textContent = '—';
          els.statusDot.dataset.ready = 'false';
          els.statusDot.dataset.error = 'true';
        } else {
          els.statusSummary.textContent = t('statusReady');
          els.lastUpdatedLabel.textContent = state.lastFetchedAt ? formatDate(state.lastFetchedAt) : '—';
          els.statusDot.dataset.ready = 'true';
          els.statusDot.dataset.error = 'false';
        }
      }

      function renderSortState() {
        els.sortButtons.forEach((button) => {
          const key = button.getAttribute('data-sort-key');
          const active = key === state.sortKey;
          const headerCell = button.closest('.head-cell');
          if (headerCell) headerCell.setAttribute('aria-sort', active ? (state.sortDirection === 'asc' ? 'ascending' : 'descending') : 'none');
          const baseLabel = button.dataset.baseLabel || button.textContent.replace(/\s[↑↓]$/, '');
          button.textContent = baseLabel + (active ? (state.sortDirection === 'asc' ? ' ↑' : ' ↓') : '');
          button.setAttribute('aria-label', ariaLabelForSort(key));
        });
        els.sortChips.forEach((chip) => {
          const active = chip.getAttribute('data-sort-chip') === state.sortKey;
          chip.dataset.active = active ? 'true' : 'false';
          chip.textContent = (chip.dataset.baseLabel || '') + (active ? (state.sortDirection === 'asc' ? ' ↑' : ' ↓') : '');
        });
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function renderInlineMarkdown(text) {
        return escapeHtml(text).replace(/`([^`]+)`/g, '<code>$1</code>');
      }

      function renderMarkdown(text) {
        const source = safeText(text, '');
        if (!source) return '<p>' + escapeHtml(t('unavailable')) + '</p>';
        const lines = source.replace(/\r\n/g, '\n').split('\n');
        const blocks = [];
        let paragraph = [];
        let listItems = [];
        let codeFence = false;
        let codeLines = [];

        function flushParagraph() {
          if (!paragraph.length) return;
          blocks.push('<p>' + renderInlineMarkdown(paragraph.join('<br>')) + '</p>');
          paragraph = [];
        }
        function flushList() {
          if (!listItems.length) return;
          blocks.push('<ul>' + listItems.map((item) => '<li>' + renderInlineMarkdown(item) + '</li>').join('') + '</ul>');
          listItems = [];
        }
        function flushCode() {
          if (!codeLines.length) return;
          blocks.push('<pre><code>' + escapeHtml(codeLines.join('\n')) + '</code></pre>');
          codeLines = [];
        }

        for (const rawLine of lines) {
          const line = rawLine || '';
          if (line.trim().startsWith('```')) {
            flushParagraph();
            flushList();
            if (codeFence) { flushCode(); codeFence = false; } else { codeFence = true; }
            continue;
          }
          if (codeFence) { codeLines.push(line); continue; }
          const trimmed = line.trim();
          if (!trimmed) { flushParagraph(); flushList(); continue; }
          const heading = /^(#{1,3})\s+(.*)$/.exec(trimmed);
          if (heading) {
            flushParagraph(); flushList();
            const level = Math.min(heading[1].length, 3);
            blocks.push('<h' + level + '>' + renderInlineMarkdown(heading[2]) + '</h' + level + '>');
            continue;
          }
          const bullet = /^[-*]\s+(.*)$/.exec(trimmed);
          if (bullet) { flushParagraph(); listItems.push(bullet[1]); continue; }
          paragraph.push(trimmed);
        }

        if (codeFence) flushCode();
        flushParagraph();
        flushList();
        return blocks.join('');
      }

      function sectionHtml(title, body) {
        return '<section class="md-section"><h3>' + escapeHtml(title) + '</h3><div class="md-block">' + body + '</div></section>';
      }

      function openDrawer() {
        state.drawerOpen = true;
        els.drawer.dataset.open = 'true';
        els.drawerBackdrop.dataset.open = 'true';
        els.toggleInspectorButton.textContent = t('closeDrawer');
      }

      function closeDrawer() {
        state.drawerOpen = false;
        els.drawer.dataset.open = 'false';
        els.drawerBackdrop.dataset.open = 'false';
        els.toggleInspectorButton.textContent = t('toggleInspector');
      }

      function renderTable() {
        els.sessionsBody.innerHTML = '';
        state.filteredSessions.forEach((session) => {
          const row = document.createElement('tr');
          const cell = document.createElement('td');
          cell.colSpan = 5;

          const rowWrap = document.createElement('div');
          rowWrap.className = 'session-row';
          rowWrap.dataset.selected = session.recordId === state.selectedRecordId ? 'true' : 'false';
          rowWrap.setAttribute('role', 'button');
          rowWrap.setAttribute('tabindex', '0');
          rowWrap.setAttribute('aria-pressed', session.recordId === state.selectedRecordId ? 'true' : 'false');
          rowWrap.setAttribute('aria-label', session.title);

          const activateRow = () => {
            state.selectedRecordId = session.recordId;
            openDrawer();
            render();
          };

          rowWrap.addEventListener('click', activateRow);
          rowWrap.addEventListener('keydown', (event) => {
            if (event.key === 'Enter' || event.key === ' ') {
              event.preventDefault();
              activateRow();
            }
          });

          const deleteArmed = state.armedDeleteRecordId === session.recordId;
          const deleteBusy = state.deletingRecordId === session.recordId;
          const badgeClass = session.titleKind === 'explicit' ? 'explicit' : 'derived';
          const badgeLabel = session.titleKind === 'explicit' ? 'ai' : 'def';

          rowWrap.innerHTML = `
            <div class="cell">
              <div class="title-stack">
                <span class="session-title-text" title="${escapeHtml(session.title)}">${escapeHtml(session.title)}</span>
                <div class="title-meta">
                  <span class="title-badge ${badgeClass}">${badgeLabel}</span>
                  <span class="rel-time">${escapeHtml(formatRelative(session.updatedAt))}</span>
                </div>
              </div>
            </div>
            <div class="cell">
              <div class="path-text" title="${escapeHtml(session.projectPath)}">${escapeHtml(session.projectPath || t('unknown'))}</div>
            </div>
            <div class="cell prompts-cell">
              <span class="prompt-preview" title="${escapeHtml(session.firstPrompt)}">${escapeHtml(session.firstPrompt || t('unavailable'))}</span>
              ${session.lastPrompt && session.lastPrompt !== session.firstPrompt ? `<span class="prompt-preview last" title="${escapeHtml(session.lastPrompt)}">${escapeHtml(session.lastPrompt)}</span>` : ''}
            </div>
            <div class="cell meta-cell">
              <span class="meta-length">${escapeHtml(formatLength(session.overallLength))}</span>
              <span class="meta-size">${escapeHtml(formatBytes(session.storageBytes))}</span>
            </div>
            <div class="cell action-cell">
              <button class="inline-delete" type="button" data-delete-id="${session.recordId}" ${deleteBusy ? 'disabled' : ''}>
                ${deleteBusy ? '…' : (deleteArmed ? escapeHtml(t('deleteArmed')) : '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>')}
              </button>
            </div>
          `;

          const deleteButton = rowWrap.querySelector('.inline-delete');
          deleteButton.dataset.armed = deleteArmed ? 'true' : 'false';
          deleteButton.addEventListener('click', async (event) => {
            event.stopPropagation();
            if (state.deletingRecordId) return;
            if (state.armedDeleteRecordId !== session.recordId) {
              state.armedDeleteRecordId = session.recordId;
              render();
              return;
            }
            await deleteSession(session);
          });

          cell.appendChild(rowWrap);
          row.appendChild(cell);
          els.sessionsBody.appendChild(row);
        });
      }

      function renderDrawer() {
        const selected = state.sessions.find((session) => session.recordId === state.selectedRecordId) || null;
        if (!selected) {
          els.drawerTitle.textContent = t('noSelection');
          els.metricLengthValue.textContent = '—';
          els.metricStorageValue.textContent = '—';
          els.metricCreatedValue.textContent = '—';
          els.metricUpdatedValue.textContent = '—';
          els.drawerScroll.innerHTML = '';
          els.drawerScroll.appendChild(els.drawerPlaceholder);
          return;
        }

        els.drawerTitle.textContent = selected.title;
        els.metricLengthValue.textContent = formatLength(selected.overallLength);
        els.metricStorageValue.textContent = formatBytes(selected.storageBytes);
        els.metricCreatedValue.textContent = formatDate(selected.startedAt);
        els.metricUpdatedValue.textContent = formatDate(selected.updatedAt);

        const blocks = [
          sectionHtml(t('projectPath'), '<p><code>' + escapeHtml(selected.projectPath || t('unknown')) + '</code></p>'),
          sectionHtml(t('firstPrompt'), renderMarkdown(selected.firstPrompt)),
          selected.lastPrompt && selected.lastPrompt !== selected.firstPrompt
            ? sectionHtml(t('lastPrompt'), renderMarkdown(selected.lastPrompt))
            : ''
        ];

        if (selected.subagentCount > 0) {
          const subagentSummary = interpolate(t('subagentSummary'), {
            count: selected.subagentCount.toLocaleString(state.lang === 'zh' ? 'zh-CN' : 'en-US'),
            entries: formatLength(selected.subagentEntryCount),
            updated: formatDate(selected.subagentUpdatedAt),
            size: formatBytes(selected.subagentStorageBytes)
          });
          blocks.push(sectionHtml(t('subagents'), '<p>' + escapeHtml(subagentSummary) + '</p>'));
        }

        els.drawerScroll.innerHTML = blocks.join('');
      }

      function renderStates() {
        els.loadingState.dataset.visible = state.loading ? 'true' : 'false';
        els.errorState.dataset.visible = !state.loading && !!state.error ? 'true' : 'false';
        const emptyReason = !state.loading && !state.error && state.filteredSessions.length === 0;
        els.emptyState.dataset.visible = emptyReason ? 'true' : 'false';
        if (state.error) els.errorMessage.textContent = state.error;
        if (emptyReason) {
          if (state.sessions.length === 0) {
            els.emptyTitle.textContent = t('emptyNone');
            els.emptyMessage.textContent = t('emptyNoneCopy');
          } else {
            els.emptyTitle.textContent = t('emptySearch');
            els.emptyMessage.textContent = t('emptySearchCopy');
          }
        }
        els.refreshButton.disabled = state.loading;
        els.retryButton.disabled = state.loading;
      }

      function render() {
        renderHeader();
        applyFilters();
        renderStats();
        renderSortState();
        renderTable();
        renderDrawer();
        renderStates();
      }

      async function fetchSessions() {
        state.loading = true;
        state.error = '';
        render();
        try {
          const response = await fetch('/api/sessions', { method: 'GET', headers: { Accept: 'application/json' }, cache: 'no-store' });
          if (!response.ok) throw new Error(t('fetchFailedPrefix') + response.status + '.');
          const payload = await response.json();
          const sessionList = Array.isArray(payload) ? payload : (payload && Array.isArray(payload.sessions) ? payload.sessions : null);
          if (!sessionList) throw new Error(t('invalidSessionRegistry'));
          state.sessions = sessionList.map(normalizeSession);
          state.lastFetchedAt = new Date().toISOString();
          if (!state.selectedRecordId && state.sessions.length) {
            state.selectedRecordId = state.sessions[0].recordId;
            openDrawer();
          }
        } catch (error) {
          state.error = error instanceof Error ? error.message : t('unknownError');
          state.sessions = [];
        } finally {
          state.loading = false;
          render();
        }
      }

      async function deleteSession(session) {
        state.deletingRecordId = session.recordId;
        render();
        try {
          const response = await fetch('/api/sessions/' + encodeURIComponent(session.sessionId), { method: 'DELETE', headers: { Accept: 'application/json' } });
          const payload = await response.json().catch(() => ({}));
          if (!response.ok) {
            throw new Error((payload && payload.error) || t('deleteFailed'));
          }
          state.sessions = state.sessions.filter((item) => item.recordId !== session.recordId);
          state.armedDeleteRecordId = null;
          if (state.selectedRecordId === session.recordId) {
            state.selectedRecordId = state.sessions[0] ? state.sessions[0].recordId : null;
            if (!state.selectedRecordId) closeDrawer();
          }
        } catch (error) {
          state.error = (error && error.message) || t('deleteFailed');
        } finally {
          state.deletingRecordId = null;
          render();
        }
      }

      function updateSort(nextKey) {
        if (state.sortKey === nextKey) {
          state.sortDirection = state.sortDirection === 'asc' ? 'desc' : 'asc';
        } else {
          state.sortKey = nextKey;
          state.sortDirection = nextKey === 'updatedAt' || nextKey === 'overallLength' ? 'desc' : 'asc';
        }
        render();
      }

      els.searchInput.addEventListener('input', (event) => {
        state.searchQuery = event.target.value;
        state.armedDeleteRecordId = null;
        render();
      });
      els.refreshButton.addEventListener('click', fetchSessions);
      els.retryButton.addEventListener('click', fetchSessions);
      els.toggleInspectorButton.addEventListener('click', () => {
        if (state.drawerOpen) closeDrawer(); else openDrawer();
      });
      els.closeDrawerButton.addEventListener('click', () => { state.armedDeleteRecordId = null; closeDrawer(); render(); });
      els.drawerBackdrop.addEventListener('click', () => { state.armedDeleteRecordId = null; closeDrawer(); render(); });
      els.langZh.addEventListener('click', () => { state.lang = 'zh'; try { localStorage.setItem('csm-lang', 'zh'); } catch (_) {} render(); });
      els.langEn.addEventListener('click', () => { state.lang = 'en'; try { localStorage.setItem('csm-lang', 'en'); } catch (_) {} render(); });
      els.sortButtons.forEach((button) => button.addEventListener('click', () => { state.armedDeleteRecordId = null; updateSort(button.getAttribute('data-sort-key')); }));
      els.sortChips.forEach((button) => button.addEventListener('click', () => { state.armedDeleteRecordId = null; updateSort(button.getAttribute('data-sort-chip')); }));
      document.addEventListener('click', (event) => {
        const deleteButton = event.target.closest('[data-delete-id]');
        if (!deleteButton && state.armedDeleteRecordId) {
          state.armedDeleteRecordId = null;
          render();
        }
      });

      // '/' focuses search; Escape blurs it
      document.addEventListener('keydown', (event) => {
        if (event.key === '/' && document.activeElement !== els.searchInput) {
          event.preventDefault();
          els.searchInput.focus();
          els.searchInput.select();
        }
        if (event.key === 'Escape' && document.activeElement === els.searchInput) {
          els.searchInput.blur();
        }
      });

      // ── Theme toggle ──────────────────────────────
      const themeToggleButton = document.getElementById('themeToggleButton');
      const themeIconMoon = document.getElementById('themeIconMoon');
      const themeIconSun  = document.getElementById('themeIconSun');

      function applyTheme(theme) {
        document.documentElement.dataset.theme = theme;
        const isDark = theme === 'dark';
        themeIconMoon.style.display = isDark ? '' : 'none';
        themeIconSun.style.display  = isDark ? 'none' : '';
        themeToggleButton.setAttribute('aria-label', isDark ? 'Switch to light mode' : 'Switch to dark mode');
        try { localStorage.setItem('csm-theme', theme); } catch (_) {}
      }

      function initTheme() {
        let saved = null;
        try { saved = localStorage.getItem('csm-theme'); } catch (_) {}
        const preferred = saved || (window.matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark');
        applyTheme(preferred);
      }

      themeToggleButton.addEventListener('click', () => {
        const current = document.documentElement.dataset.theme || 'dark';
        applyTheme(current === 'dark' ? 'light' : 'dark');
      });

      initTheme();
      render();
      fetchSessions();
    })();
  </script>
</body>
</html>
