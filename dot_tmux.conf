#  Managed by chezmoi · https://chezmoi.io
# =============================================================================

# ---------------------------------------------------------------------------
#  Terminal & Colors
# ---------------------------------------------------------------------------
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# ---------------------------------------------------------------------------
#  General
# ---------------------------------------------------------------------------
set -g mouse on                # 鼠标支持（滚动、点击面板、调整大小）
set -g history-limit 100000    # 滚动缓冲区（大日志/长输出必备）
set -g escape-time 10          # 降低 Escape 延迟
set -g focus-events on         # 让编辑器感知焦点变化
set -g base-index 1            # 窗口编号从 1 开始
setw -g pane-base-index 1      # 面板编号从 1 开始
set -g renumber-windows on     # 关闭窗口后自动重编号

# ---------------------------------------------------------------------------
#  Prefix key (Ctrl+a)
# ---------------------------------------------------------------------------
set -g prefix C-a
unbind C-b
bind C-a send-prefix

# ---------------------------------------------------------------------------
#  Key bindings
# ---------------------------------------------------------------------------
# 直觉分屏（保留当前路径）
bind | split-window -h -c "#{pane_current_path}"
bind - split-window -v -c "#{pane_current_path}"
unbind '"'
unbind %

# 用 vim 键切换面板
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# 快速重载配置
bind r source-file ~/.tmux.conf \; display-message "Config reloaded!"

# ---------------------------------------------------------------------------
#  Status bar (简洁风格)
# ---------------------------------------------------------------------------
set -g status-position bottom
set -g status-interval 5
set -g status-style "bg=colour235,fg=colour248"
set -g status-left "#[fg=colour232,bg=colour39,bold] #S #[fg=colour39,bg=colour235] "
set -g status-left-length 30
set -g status-right "#[fg=colour248] %m-%d %H:%M "
setw -g window-status-format " #I:#W "
setw -g window-status-current-format "#[fg=colour232,bg=colour39,bold] #I:#W "

# ---------------------------------------------------------------------------
#  Pane borders
# ---------------------------------------------------------------------------
set -g pane-border-style "fg=colour238"
set -g pane-active-border-style "fg=colour39"
